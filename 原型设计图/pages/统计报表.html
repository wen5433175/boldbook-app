    <style id="theme-vars">
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  /* ===== Core Neobrutalism Colors ===== */
  --boldbook-background: #FFFBF0;
  --boldbook-foreground: #111111;

  /* Primary — 亮黄 (highlight / button) */
  --boldbook-primary: #FFE156;
  --boldbook-primary-foreground: #111111;

  /* Secondary — warm cream surface */
  --boldbook-secondary: #F5F0E0;
  --boldbook-secondary-foreground: #111111;

  /* Accent — 薰衣草紫 (budget / charts) */
  --boldbook-accent: #9B8BF4;
  --boldbook-accent-foreground: #FFFFFF;

  /* Destructive — 荧光粉 (expense / warning / delete) */
  --boldbook-destructive: #FF4F87;
  --boldbook-destructive-foreground: #FFFFFF;

  /* Income — 电光青 (income / success) */
  --boldbook-income: #00D4AA;
  --boldbook-income-foreground: #111111;

  /* Card / Surface */
  --boldbook-card: #FFFFFF;
  --boldbook-card-foreground: #111111;

  /* Muted */
  --boldbook-muted: #F5F0E0;
  --boldbook-muted-foreground: #6B6B6B;

  /* Border / Input / Ring — all black for Neobrutalism */
  --boldbook-border: #111111;
  --boldbook-input: #111111;
  --boldbook-ring: #111111;

  /* Chart palette */
  --boldbook-chart-1: #FF4F87;
  --boldbook-chart-2: #00D4AA;
  --boldbook-chart-3: #FFE156;
  --boldbook-chart-4: #9B8BF4;
  --boldbook-chart-5: #111111;

  /* ===== Radius ===== */
  --boldbook-radius-small: 8px;
  --boldbook-radius-medium: 12px;
  --boldbook-radius-large: 16px;

  /* ===== Typography ===== */
  --boldbook-font-title: 'Space Grotesk', sans-serif;
  --boldbook-font-body: 'JetBrains Mono', monospace;

  /* ===== Neobrutalism Shadow System ===== */
  --boldbook-shadow-sm: 2px 2px 0 #111111;
  --boldbook-shadow: 4px 4px 0 #111111;
  --boldbook-shadow-lg: 6px 6px 0 #111111;

  /* ===== Border Width ===== */
  --boldbook-border-width: 3px;
}

/* ===== Typography Utility Classes ===== */
.boldbook-title { font-family: 'Space Grotesk', sans-serif; }
.boldbook-body { font-family: 'JetBrains Mono', monospace; }
.boldbook-mono { font-family: 'JetBrains Mono', monospace; }

/* ===== Neobrutalism Component Utilities ===== */
.nb-border { border: 3px solid var(--boldbook-border); }
.nb-border-t { border-top: 3px solid var(--boldbook-border); }
.nb-border-b { border-bottom: 3px solid var(--boldbook-border); }
.nb-border-l { border-left: 3px solid var(--boldbook-border); }
.nb-border-r { border-right: 3px solid var(--boldbook-border); }

.nb-shadow { box-shadow: 4px 4px 0 #111111; }
.nb-shadow-sm { box-shadow: 2px 2px 0 #111111; }
.nb-shadow-lg { box-shadow: 6px 6px 0 #111111; }

.nb-card {
  background: var(--boldbook-card);
  border: 3px solid var(--boldbook-border);
  border-radius: var(--boldbook-radius-large);
  box-shadow: 4px 4px 0 #111111;
}

.nb-btn {
  border: 3px solid var(--boldbook-border);
  border-radius: var(--boldbook-radius-medium);
  box-shadow: 4px 4px 0 #111111;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  cursor: pointer;
}

.nb-btn:active {
  transform: translate(4px, 4px);
  box-shadow: 0 0 0 #111111;
}

.nb-input {
  border: 3px solid var(--boldbook-border);
  border-radius: var(--boldbook-radius-medium);
  font-family: 'JetBrains Mono', monospace;
  background: #FFFFFF;
}

.nb-tag {
  border: 2px solid var(--boldbook-border);
  border-radius: var(--boldbook-radius-full, 9999px);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 2px 10px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.nb-rotate-1 { transform: rotate(-1deg); }
.nb-rotate-2 { transform: rotate(1.5deg); }
.nb-rotate-3 { transform: rotate(-2deg); }

/* ===== Stagger Animation ===== */
@keyframes nb-pop-in {
  0% { opacity: 0; transform: translateY(12px) scale(0.96); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.nb-animate-pop {
  animation: nb-pop-in 0.4s ease-out both;
}

.nb-delay-1 { animation-delay: 0.08s; }
.nb-delay-2 { animation-delay: 0.16s; }
.nb-delay-3 { animation-delay: 0.24s; }
.nb-delay-4 { animation-delay: 0.32s; }
.nb-delay-5 { animation-delay: 0.40s; }

/* ===== Scrollbar ===== */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* ===== Base Body ===== */
body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--boldbook-background);
  color: var(--boldbook-foreground);
}

<!--
  BoldBook — Bottom Tab Bar Shell Fragment
  ========================================
  This is an HTML SNIPPET, not a full document.
  It contains only the bottom tab bar <nav> and a scoped <style> block.
  Include this fragment INSIDE a leaf page's <body>.
  Leaf pages add the .active class to the current tab button.

  Dependencies (loaded by each leaf page's <head>):
    - Tailwind CSS v4 CDN  (layout/spacing utilities)
    - Lucide Icons CDN     (lucide@1.7.0 — renders <i data-lucide="...">)
    - Google Fonts: Space Grotesk + JetBrains Mono

  Design tokens (Neobrutalism):
    bg #FFFBF0 | ink #111111 | pink #FF4F87 | teal #00D4AA
    yellow #FFE156 | purple #9B8BF4 | gray #6B6B6B
    border 3px solid ink | shadow 4px 4px 0 ink (no blur)
    radius: card 16px | button 12px | pill 9999px
-->
<style>
  :root {
    --boldbook-bg: #FFFBF0;
    --boldbook-ink: #111111;
    --boldbook-pink: #FF4F87;
    --boldbook-teal: #00D4AA;
    --boldbook-yellow: #FFE156;
    --boldbook-purple: #9B8BF4;
    --boldbook-gray: #6B6B6B;
    --boldbook-radius-card: 16px;
    --boldbook-radius-btn: 12px;
    --boldbook-radius-pill: 9999px;
    --boldbook-border-w: 3px;
    --boldbook-shadow: 4px 4px 0 var(--boldbook-ink);
  }

  /* ---- Tab Bar Container ---- */
  .boldbook-tabbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 375px;
    height: 72px;
    background: #FFFFFF;
    border-top: var(--boldbook-border-w) solid var(--boldbook-ink);
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 50;
    box-sizing: border-box;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ---- Regular Tab Buttons ---- */
  .boldbook-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    min-height: 44px;
    background: transparent;
    border: none;
    cursor: pointer;
    position: relative;
    padding: 6px 0;
    color: var(--boldbook-gray);
    transition: color 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .boldbook-tab svg {
    width: 22px;
    height: 22px;
    stroke-width: 2;
  }

  .boldbook-tab-label {
    font-size: 10px;
    line-height: 1;
    font-weight: 500;
    white-space: nowrap;
  }

  /* ---- Active Tab State (added by leaf pages via .active) ---- */
  .boldbook-tab.active {
    color: var(--boldbook-ink);
  }

  .boldbook-tab.active .boldbook-tab-label {
    font-weight: 700;
  }

  .boldbook-tab.active::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 3px;
    background: var(--boldbook-yellow);
    border-radius: var(--boldbook-radius-pill);
  }

  /* ---- Center FAB Button ---- */
  .boldbook-fab {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: var(--boldbook-radius-pill);
    background: var(--boldbook-yellow);
    border: var(--boldbook-border-w) solid var(--boldbook-ink);
