<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记一笔 - BoldBook</title>
    <style id="theme-vars">
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  /* ===== Core Neobrutalism Colors ===== */
  --boldbook-background: #FFFBF0;
  --boldbook-foreground: #111111;

  /* Primary — 亮黄 (highlight / button) */
  --boldbook-primary: #FFE156;
  --boldbook-primary-foreground: #111111;

  /* Secondary — warm cream surface */
  --boldbook-secondary: #F5F0E0;
  --boldbook-secondary-foreground: #111111;

  /* Accent — 薰衣草紫 (budget / charts) */
  --boldbook-accent: #9B8BF4;
  --boldbook-accent-foreground: #FFFFFF;

  /* Destructive — 荧光粉 (expense / warning / delete) */
  --boldbook-destructive: #FF4F87;
  --boldbook-destructive-foreground: #FFFFFF;

  /* Income — 电光青 (income / success) */
  --boldbook-income: #00D4AA;
  --boldbook-income-foreground: #111111;

  /* Card / Surface */
  --boldbook-card: #FFFFFF;
  --boldbook-card-foreground: #111111;

  /* Muted */
  --boldbook-muted: #F5F0E0;
  --boldbook-muted-foreground: #6B6B6B;

  /* Border / Input / Ring — all black for Neobrutalism */
  --boldbook-border: #111111;
  --boldbook-input: #111111;
  --boldbook-ring: #111111;

  /* Chart palette */
  --boldbook-chart-1: #FF4F87;
  --boldbook-chart-2: #00D4AA;
  --boldbook-chart-3: #FFE156;
  --boldbook-chart-4: #9B8BF4;
  --boldbook-chart-5: #111111;

  /* ===== Radius ===== */
  --boldbook-radius-small: 8px;
  --boldbook-radius-medium: 12px;
  --boldbook-radius-large: 16px;

  /* ===== Typography ===== */
  --boldbook-font-title: 'Space Grotesk', sans-serif;
  --boldbook-font-body: 'JetBrains Mono', monospace;

  /* ===== Neobrutalism Shadow System ===== */
  --boldbook-shadow-sm: 2px 2px 0 #111111;
  --boldbook-shadow: 4px 4px 0 #111111;
  --boldbook-shadow-lg: 6px 6px 0 #111111;

  /* ===== Border Width ===== */
  --boldbook-border-width: 3px;
}

/* ===== Typography Utility Classes ===== */
.boldbook-title { font-family: 'Space Grotesk', sans-serif; }
.boldbook-body { font-family: 'JetBrains Mono', monospace; }
.boldbook-mono { font-family: 'JetBrains Mono', monospace; }

/* ===== Neobrutalism Component Utilities ===== */
.nb-border { border: 3px solid var(--boldbook-border); }
.nb-border-t { border-top: 3px solid var(--boldbook-border); }
.nb-border-b { border-bottom: 3px solid var(--boldbook-border); }
.nb-border-l { border-left: 3px solid var(--boldbook-border); }
.nb-border-r { border-right: 3px solid var(--boldbook-border); }

.nb-shadow { box-shadow: 4px 4px 0 #111111; }
.nb-shadow-sm { box-shadow: 2px 2px 0 #111111; }
.nb-shadow-lg { box-shadow: 6px 6px 0 #111111; }

.nb-card {
  background: var(--boldbook-card);
  border: 3px solid var(--boldbook-border);
  border-radius: var(--boldbook-radius-large);
  box-shadow: 4px 4px 0 #111111;
}

.nb-btn {
  border: 3px solid var(--boldbook-border);
  border-radius: var(--boldbook-radius-medium);
  box-shadow: 4px 4px 0 #111111;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  cursor: pointer;
}

.nb-btn:active {
  transform: translate(4px, 4px);
  box-shadow: 0 0 0 #111111;
}

.nb-input {
  border: 3px solid var(--boldbook-border);
  border-radius: var(--boldbook-radius-medium);
  font-family: 'JetBrains Mono', monospace;
  background: #FFFFFF;
}

.nb-tag {
  border: 2px solid var(--boldbook-border);
  border-radius: var(--boldbook-radius-full, 9999px);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 2px 10px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.nb-rotate-1 { transform: rotate(-1deg); }
.nb-rotate-2 { transform: rotate(1.5deg); }
.nb-rotate-3 { transform: rotate(-2deg); }

/* ===== Stagger Animation ===== */
@keyframes nb-pop-in {
  0% { opacity: 0; transform: translateY(12px) scale(0.96); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.nb-animate-pop {
  animation: nb-pop-in 0.4s ease-out both;
}

.nb-delay-1 { animation-delay: 0.08s; }
.nb-delay-2 { animation-delay: 0.16s; }
.nb-delay-3 { animation-delay: 0.24s; }
.nb-delay-4 { animation-delay: 0.32s; }
.nb-delay-5 { animation-delay: 0.40s; }

/* ===== Scrollbar ===== */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* ===== Base Body ===== */
body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--boldbook-background);
  color: var(--boldbook-foreground);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--boldbook-background);
    --color-foreground: var(--boldbook-foreground);
    --color-card: var(--boldbook-card);
    --color-card-foreground: var(--boldbook-card-foreground);
    --color-primary: var(--boldbook-primary);
    --color-primary-foreground: var(--boldbook-primary-foreground);
    --color-secondary: var(--boldbook-secondary);
    --color-secondary-foreground: var(--boldbook-secondary-foreground);
    --color-muted: var(--boldbook-muted);
    --color-muted-foreground: var(--boldbook-muted-foreground);
    --color-accent: var(--boldbook-accent);
    --color-accent-foreground: var(--boldbook-accent-foreground);
    --color-destructive: var(--boldbook-destructive);
    --color-destructive-foreground: var(--boldbook-destructive-foreground);
    --color-border: var(--boldbook-border);
    --color-input: var(--boldbook-input);
    --color-ring: var(--boldbook-ring);
    --color-chart-1: var(--boldbook-chart-1);
    --color-chart-2: var(--boldbook-chart-2);
    --color-chart-3: var(--boldbook-chart-3);
    --color-chart-4: var(--boldbook-chart-4);
    --color-chart-5: var(--boldbook-chart-5);
    --radius-sm: var(--boldbook-radius-small);
    --radius-md: var(--boldbook-radius-medium);
    --radius-lg: var(--boldbook-radius-large);
  }
  @layer base {
    body { background: var(--boldbook-background); color: var(--boldbook-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;

<body class="min-h-screen font-sans antialiased">
    <main>
      <style>
        @keyframes nb-blink {
          0%, 50% { opacity: 1; }
          51%, 100% { opacity: 0; }
        }
        .blink-cursor { animation: nb-blink 1s step-end infinite; }
        .nb-pressable { transition: transform 0.1s ease, box-shadow 0.1s ease; -webkit-tap-highlight-color: transparent; }
        .nb-pressable:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 #111111; }
        .nb-pressable-sm { transition: transform 0.1s ease, box-shadow 0.1s ease; -webkit-tap-highlight-color: transparent; }
        .nb-pressable-sm:active { transform: translate(2px, 2px); box-shadow: 0 0 0 #111111; }
        .nb-cat-cell { border: 3px solid #111111; border-radius: 12px; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: transform 0.12s ease, box-shadow 0.12s ease; -webkit-tap-highlight-color: transparent; }
        .nb-cat-cell:active { transform: translate(2px, 2px); box-shadow: 0 0 0 #111111; }
        .nb-cat-active { background: #FF4F87 !important; box-shadow: 4px 4px 0 #111111 !important; transform: scale(1.05); }
        .nb-cat-active i, .nb-cat-active span { color: #FFFFFF !important; }
        .nb-cat-active span { font-weight: 700 !important; }
        .nb-toggle-seg { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.15s ease; }
        @media (prefers-reduced-motion: reduce) {
          .blink-cursor, .nb-animate-pop, .nb-pressable, .nb-pressable-sm, .nb-cat-cell { animation: none !important; transition: none !important; }
          .nb-cat-active { transform: none !important; }
        }
      </style>

      <div style="max-width:375px;margin:0 auto;min-height:100vh;padding:16px;padding-bottom:100px;background:#FFFBF0;">

        <!-- 1. Top Header -->
        <header class="flex items-center justify-between nb-animate-pop" style="margin-bottom:20px;">
          <button type="button" aria-label="返回" class="nb-pressable-sm" style="width:40px;height:40px;border-radius:50%;background:#FFFFFF;border:3px solid #111111;box-shadow:2px 2px 0 #111111;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">
            <i data-lucide="arrow-left" style="width:20px;height:20px;color:#111111;"></i>
          </button>
          <h1 class="boldbook-title" style="font-weight:700;font-size:18px;color:#111111;margin:0;">记一笔</h1>
          <div style="width:40px;height:40px;flex-shrink:0;"></div>
        </header>

        <!-- 2. Type Toggle (支出 / 收入) -->
        <div class="nb-animate-pop nb-delay-1" style="display:flex;border:3px solid #111111;border-radius:9999px;box-shadow:4px 4px 0 #111111;overflow:hidden;margin-bottom:20px;">
          <button type="button" class="nb-toggle-seg nb-pressable-sm" style="flex:1;height:48px;background:#FF4F87;color:#FFFFFF;box-shadow:inset -4px -4px 0 rgba(0,0,0,0.12);">
            支出
          </button>
          <button type="button" class="nb-toggle-seg nb-pressable-sm" style="flex:1;height:48px;background:#FFFFFF;color:#6B6B6B;">
            收入
          </button>
        </div>

        <!-- 3. Amount Input Display -->
        <div class="nb-card nb-animate-pop nb-delay-2" style="padding:24px;margin-bottom:24px;">
          <div class="flex items-baseline" style="gap:4px;">
            <span class="boldbook-title" style="font-size:28px;color:#6B6B6B;font-weight:600;">¥</span>
            <span class="boldbook-body" style="font-size:48px;font-weight:700;color:#111111;line-height:1;letter-spacing:-1px;">0.00</span>
            <span class="blink-cursor" style="display:inline-block;width:3px;height:40px;background:#111111;margin-left:2px;"></span>
          </div>
          <p style="font-size:12px;color:#6B6B6B;margin-top:8px;margin-bottom:0;">输入金额</p>
        </div>

        <!-- 4. Category Selection Grid -->
        <div class="nb-animate-pop nb-delay-3" style="margin-bottom:24px;">
          <h2 class="boldbook-title" style="font-weight:700;font-size:14px;color:#111111;margin:0 0 12px 0;">选择分类</h2>
          <div class="grid grid-cols-4" style="gap:8px;">
            <!-- 餐饮 — ACTIVE -->
            <button type="button" class="nb-cat-cell nb-cat-active" style="background:#FFFFFF;box-shadow:2px 2px 0 #111111;">
              <i data-lucide="utensils" style="width:24px;height:24px;color:#111111;"></i>
              <span style="font-size:10px;color:#111111;font-weight:500;font-family:'JetBrains Mono',monospace;">餐饮</span>
            </button>
            <!-- 交通 -->
            <button type="button" class="nb-cat-cell" style="background:#FFFFFF;box-shadow:2px 2px 0 #111111;">
              <i data-lucide="car" style="width:24px;height:24px;color:#111111;"></i>
              <span style="font-size:10px;color:#111111;font-weight:500;font-family:'JetBrains Mono',monospace;">交通</span>
            </button>
            <!-- 购物 -->
            <button type="button" class="nb-cat-cell" style="background:#FFFFFF;box-shadow:2px 2px 0 #111111;">
              <i data-lucide="shopping-bag" style="width:24px;height:24px;color:#111111;"></i>
              <span style="font-size:10px;color:#111111;font-weight:500;font-family:'JetBrains Mono',monospace;">购物</span>
            </button>
            <!-- 娱乐 -->
            <button type="button" class="nb-cat-cell" style="background:#FFFFFF;box-shadow:2px 2px 0 #111111;">
              <i data-lucide="gamepad-2" style="width:24px;height:24px;color:#111111;"></i>
              <span style="font-size:10px;color:#111111;font-weight:500;font-family:'JetBrains Mono',monospace;">娱乐</span>
            </button>
            <!-- 居住 -->
            <button type="button" class="nb-cat-cell" style="background:#FFFFFF;box-shadow:2px 2px 0 #111111;">
              <i data-lucide="home" style="width:24px;height:24px;color:#111111;"></i>
              <span style="font-size:10px;color:#111111;font-weight:500;font-family:'JetBrains Mono',monospace;">居住</span>
            </button>
            <!-- 医疗 -->
            <button type="button" class="nb-cat-cell" style="background:#FFFFFF;box-shadow:2px 2px 0 #111111;">
              <i data-lucide="heart-pulse" style="width:24px;height:24px;color:#111111;"></i>
              <span style="font-size:10px;color:#111111;font-weight:500;font-family:'JetBrains Mono',monospace;">医疗</span>
            </button>
            <!-- 教育 -->
            <button type="button" class="nb-cat-cell" style="background:#FFFFFF;box-shadow:2px 2px 0 #111111;">
              <i data-lucide="graduation-cap" style="width:24px;height:24px;color:#111111;"></i>
              <span style="font-size:10px;color:#111111;font-weight:500;font-family:'JetBrains Mono',monospace;">教育</span>
            </button>
            <!-- 其他 -->
            <button type="button" class="nb-cat-cell" style="background:#FFFFFF;box-shadow:2px 2px 0 #111111;">
              <i data-lucide="more-horizontal" style="width:24px;height:24px;color:#111111;"></i>
              <span style="font-size:10px;color:#111111;font-weight:500;font-family:'JetBrains Mono',monospace;">其他</span>
            </button>
          </div>
        </div>

        <!-- 5. Date Picker Row -->
        <div class="nb-animate-pop nb-delay-4 nb-pressable-sm" style="background:#FFFFFF;border:3px solid #111111;border-radius:12px;box-shadow:2px 2px 0 #111111;height:48px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;cursor:pointer;">
          <div class="flex items-center" style="gap:8px;min-width:0;">
            <i data-lucide="calendar" style="width:18px;height:18px;color:#111111;flex-shrink:0;"></i>
            <span class="boldbook-body" style="font-size:14px;color:#111111;">2026年7月11日</span>
          </div>
          <i data-lucide="chevron-right" style="width:18px;height:18px;color:#6B6B6B;flex-shrink:0;"></i>
        </div>

        <!-- 6. Note Input -->
        <div class="nb-animate-pop nb-delay-5" style="background:#FFFFFF;border:3px solid #111111;border-radius:12px;box-shadow:2px 2px 0 #111111;height:48px;padding:0 16px;display:flex;align-items:center;gap:8px;margin-bottom:24px;">
          <i data-lucide="pencil" style="width:18px;height:18px;color:#6B6B6B;flex-shrink:0;"></i>
          <input type="text" placeholder="添加备注..." class="boldbook-body" style="font-size:14px;color:#111111;border:none;outline:none;background:transparent;width:100%;height:100%;" />
        </div>

        <!-- 7. Bottom Action Buttons -->
        <div class="nb-animate-pop nb-delay-5" style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px;">
          <button type="button" data-dom-id="btn-save-view" class="nb-btn nb-pressable" style="background:#FFE156;color:#111111;height:52px;width:100%;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;">
            保存并查看明细
          </button>
          <button type="button" class="nb-btn nb-pressable-sm" style="background:#FFFFFF;color:#111111;box-shadow:2px 2px 0 #111111;height:48px;width:100%;font-size:15px;font-weight:600;">
            仅保存
          </button>
        </div>

      </div>
    </main>
<!-- BoldBook Bottom Tab Bar Shell Fragment (with active state on FAB) -->
<style>
  :root {
    --boldbook-bg: #FFFBF0;
    --boldbook-ink: #111111;
    --boldbook-pink: #FF4F87;
    --boldbook-teal: #00D4AA;
    --boldbook-yellow: #FFE156;
    --boldbook-purple: #9B8BF4;
    --boldbook-gray: #6B6B6B;
    --boldbook-radius-card: 16px;
    --boldbook-radius-btn: 12px;
    --boldbook-radius-pill: 9999px;
    --boldbook-border-w: 3px;
    --boldbook-shadow: 4px 4px 0 var(--boldbook-ink);
  }

  .boldbook-tabbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 375px;
    height: 72px;
    background: #FFFFFF;
    border-top: var(--boldbook-border-w) solid var(--boldbook-ink);
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 50;
    box-sizing: border-box;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    font-family: 'JetBrains Mono', monospace;
  }

  .boldbook-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    min-height: 44px;
    background: transparent;
    border: none;
    cursor: pointer;
    position: relative;
    padding: 6px 0;
    color: var(--boldbook-gray);
    transition: color 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .boldbook-tab svg {
    width: 22px;
    height: 22px;
    stroke-width: 2;
  }

  .boldbook-tab-label {
    font-size: 10px;
    line-height: 1;
    font-weight: 500;
    white-space: nowrap;
  }

  .boldbook-tab.active {
    color: var(--boldbook-ink);
  }

  .boldbook-tab.active .boldbook-tab-label {
    font-weight: 700;
  }

  .boldbook-tab.active::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 3px;
    background: var(--boldbook-yellow);
    border-radius: var(--boldbook-radius-pill);
  }

  .boldbook-fab {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: var(--boldbook-radius-pill);
    background: var(--boldbook-yellow);
    border: var(--boldbook-border-w) solid var(--boldbook-ink);
    box-shadow: var(--boldbook-shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transform: translateY(-20px);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .boldbook-fab svg {
    width: 28px;
    height: 28px;
    stroke-width: 2.5;
    color: var(--boldbook-ink);
  }

  .boldbook-fab:active {
    transform: translateY(-16px);
    box-shadow: 2px 2px 0 var(--boldbook-ink);
  }
</style>

<nav class="boldbook-tabbar" aria-label="Bottom navigation">
  <button class="boldbook-tab" type="button" data-nav-key="home" data-dom-id="tab-home">
    <i data-lucide="home"></i>
    <span class="boldbook-tab-label">首页</span>
  </button>

  <button class="boldbook-tab" type="button" data-nav-key="transactions" data-dom-id="tab-transactions">
    <i data-lucide="receipt"></i>
    <span class="boldbook-tab-label">明细</span>
  </button>

  <button class="boldbook-fab active" type="button" data-nav-key="add" data-dom-id="tab-add" aria-label="记一笔">
    <i data-lucide="plus"></i>
  </button>

  <button class="boldbook-tab" type="button" data-nav-key="stats" data-dom-id="tab-stats">
    <i data-lucide="bar-chart-3"></i>
    <span class="boldbook-tab-label">统计</span>
  </button>

  <button class="boldbook-tab" type="button" data-nav-key="profile" data-dom-id="tab-profile">
    <i data-lucide="user"></i>
    <span class="boldbook-tab-label">我的</span>
  </button>
</nav>
